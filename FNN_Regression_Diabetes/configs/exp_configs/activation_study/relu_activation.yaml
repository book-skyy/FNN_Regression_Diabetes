# configs/exp_configs/activation_study/relu_activation.yaml
# Test ReLU activation function (fixed: 2 hidden layers, learning rate 0.001)

experiment_name: "activation_study_relu"
description: "Research activation function impact: Test ReLU activation with 2 hidden layers and learning rate 0.001."
tags: ["activation_study", "relu"]

model:
  # --- Key modification: ReLU activation ---
  activation: "relu"
  hidden_layers: [64, 32]  # 2 hidden layers
  input_dim: 10
  output_dim: 1
  dropout_rate: 0.0

# Fixed learning rate and other hyperparameters
data:
  batch_size: 32
  test_size: 0.1
  validation_size: 0.1
  random_state: 42

training:
  optimizer: "Adam"
  learning_rate: 0.001  # Fixed learning rate
  epochs: 150
  loss_function: "MSELoss"

runtime:
  seed: 42
  device: "auto"
  early_stopping_patience: 10
