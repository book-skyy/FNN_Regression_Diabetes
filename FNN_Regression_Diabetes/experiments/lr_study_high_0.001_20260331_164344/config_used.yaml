data:
  batch_size: 32
  random_state: 42
  test_size: 0.1
  validation_size: 0.1
description: 研究学习率的影响：测试一个较高的学习率（0.001）。
experiment_name: lr_study_high_0.001
model:
  activation: relu
  dropout_rate: 0.0
  hidden_layers:
  - 64
  - 32
  input_dim: 10
  output_dim: 1
project_name: FNN_Regression_Diabetes
runtime:
  device: auto
  output_dir: ./experiments
  seed: 42
tags:
- lr_study
- low_lr
training:
  epochs: 150
  learning_rate: 0.001
  loss_function: MSELoss
  optimizer: Adam
